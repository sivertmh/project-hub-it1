<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Siverts Kalkulator</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <h1>Siverts Kalkulator</h1>
  <a class="back-btn" href="../index.html">tilbake til oversikt</a>
  <main class="calc-container" id="calc-container">
    <input type="text" id="output" readonly />
    <div class="btns">
      <div class="operations">
        <button>/</button>
        <button>*</button>
        <button>-</button>
        <button>+</button>
        <button>=</button>
      </div>
      <div class="numbers">
        <button class="double-btn" id="clear">C</button>
        <button>D</button>
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="double-btn">0</button>
        <button>.</button>
      </div>
    </div>
  </main>
  <script src="script.js"></script>
</body>

</html>
